	document.getElementById('community').onchange=async function(e){
		if (e.currentTarget.checked==true){
			document.getElementById('step2').style='';
			document.getElementById('step2').innerHTML=community['step2'];
			document.getElementById('step2').scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
			var details=[];
			document.getElementById('continue').onclick=async function(){
				var entries=['flat','assc','addr','blocks','floor','total'];
				var count=0;
				for (let u of entries){

					if (document.getElementById(u).value.trim().length==0){
						alert('All fields are mandatory');
						break;
					}
					else{
						count+=1;

					}
				}
				if (count==entries.length){
					for (let y of entries){
						details.push(document.getElementById(y).value.trim());
					}
					document.getElementById('step3').style='';
					document.getElementById('step3').innerHTML=community['step3'];
					document.getElementById('step3').scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
					var comuid=Math.trunc(Math.random(1,10)*1000000);
					var exists=true;
					var comids=[];
					await db.collection('community').get().then(t => {
						t.docs.map(async function(g){
							comids.push(await g.data().uid)

						})
					})
					while (exists==true){
						if (comids.includes(comuid.toString())==true){
							comuid=Math.trunc(Math.random(1,10)*1000000);

						}
						else{
							exists=false;
						}
					}
					var posting={};
					document.getElementById('addtb').onclick=function(){
						if (document.getElementById('postsel').value=='default' || document.getElementById('bearername').value.trim().length==0){
							alert('Enter Designation and Name of Office Bearer');
						}
						else{
							document.getElementById('td'+document.getElementById('postsel').value).innerHTML=`<center>`+document.getElementById('bearername').value.trim()+`</center>`;
							posting[document.getElementById(document.getElementById('postsel').value).innerHTML]=document.getElementById('bearername').value.trim();
							document.getElementById('postsel').value='default';
							document.getElementById('bearername').value='';

						}
					}
					document.getElementById('confirm_list').onclick=async function(){
						if (Object.keys(posting).length!=6){
							alert('All Office Bearers have to be declared');

						}
						else{
							document.getElementById('step4').style='';
							document.getElementById('step4').innerHTML=community['step4'];
							document.getElementById('step4').scrollIntoView({behavior:'smooth'})
							var usernames={};
							for (let m in posting){
								document.getElementById(m).value=posting[m].toLowerCase().split(" ").join('')+'.'+m.toLowerCase().split(" ").join('')+'.'+comuid.toString()+'@neigbhonet.com';
								usernames[m]=posting[m].toLowerCase().split(" ").join('')+'.'+m.toLowerCase().split(" ").join('')+'.'+comuid.toString()+'@neigbhonet.com';
								document.getElementById(m).disabled=true;
							}
							document.getElementById('uid').innerHTML=comuid;
							document.getElementById('addcom').onclick=async function(){
								await db.collection('community').doc(details[0]+' '+comuid.toString()).set({
									addr:details[2],
									floor_block:details[4],
									name:details[1],
									no_of_blocks:details[3],
									total_flats:details[5],
									uid:comuid.toString()
								});
								for (let y in posting){
									await db.collection('admins').doc(usernames[y]).set({
										name:posting[y],
										username:usernames[y],
										passwd:comuid.toString(),
										designation:y
									})
								}
								document.getElementById('addcom').innerHTML=`<span class="fa fa-solid fa-hourglass" style="animation-name:loading;animation-duration:1s;animation-iteration-count:infinite;animation-fill-mode:forwards;"></span>`;
								for (let u in usernames){
									await auth.createUserWithEmailAndPassword(usernames[u],comuid.toString());
								}
								alert('Community registered Successfully.\nNote down the usernames for future usage');
								document.getElementById('addcom').innerHTML=`<span class="fa fa-solid fa-person"></span>  Register Community`
							}




						}
					} 
				}
			}

		}

				auth.signInWithEmailAndPassword('admin@neighbonet.com','Abc!123');
				if (document.getElementById('comcode').value.trim().length==0){
						alert('Enter Community Code');
				}
				else{
					if (document.getElementById('comcode').value.trim().length!=6){
						alert('Invalid Community Code');
					}
					else{

						document.getElementById('connectbtn').innerHTML=`<span class="fa fa-solid fa-hourglass" style="animation-name:loading;animation-duration:1s;animation-iteration-count:infinite;animation-fill-mode:forwards;"></span>`;
						await db.collection('community').get().then(async function(g){
							g.docs.map(t => {
								comids.push(t.data().uid);
							})

						})
						console.log(comids)
						if (comids.includes(document.getElementById('comcode').value.trim())==false){
							alert('Community Code not found');
							document.getElementById('connectbtn').innerHTML=`<span class="fa fa-solid fa-link"></span> Connect`

						}
						else{

							document.getElementById('step3').style='';
							document.getElementById('connectbtn').innerHTML=`<span class="fa fa-solid fa-link"></span> Connect`
							document.getElementById('step3').innerHTML=residents['step3'];
							document.getElementById('step3').scrollIntoView({behavior:'smooth'});
							document.getElementById('selfreg').onclick=async function(){
								var entries=['name','addr','phno','block','floor','doorno'];
								var c=0;
								for (let i of entries){
									if (document.getElementById(i).value.trim().length==0){
										alert('All fields are mandatory');
										break;
									}
									else{
										c+=1;

									}
								}
								if (c==entries.length){
									var username=document.getElementById('name').value.trim().toLowerCase()+document.getElementById('block').value.trim().toLowerCase()+'_'+document.getElementById('doorno').value.trim().toLowerCase()+'.'+document.getElementById('comcode').value.trim().toLowerCase()+'@neigbhonet.com';


									document.getElementById('step4').style='';
									document.getElementById('step4').innerHTML=residents['step4'];
									document.getElementById('step4').scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
									document.getElementById('username').value=username;
									var passwd=false;
									document.getElementById('see').onclick=function(){
										if (passwd==false){
											document.getElementById('passwd').type='text';
											document.getElementById('see').innerHTML=`<span class="fa fa-solid fa-eye-slash"></span>`
											passwd=true;

										}
										else{
											document.getElementById('passwd').type='password';
											document.getElementById('see').innerHTML=`<span class="fa fa-solid fa-eye"></span>`
											passwd=false;
										}

									}
									document.getElementById('consee').onclick=function(){
										if (passwd==false){
											document.getElementById('conpasswd').type='text';
											document.getElementById('see').innerHTML=`<span class="fa fa-solid fa-eye-slash"></span>`
											passwd=true;

										}
										else{
											document.getElementById('conpasswd').type='password';
											document.getElementById('see').innerHTML=`<span class="fa fa-solid fa-eye"></span>`
											passwd=false;
										}

									}
									document.getElementById('finalreg').onclick=async function(){
										var passwd;
										var conpasswd;
										passwd=document.getElementById('passwd').value.trim();
										conpasswd=document.getElementById('conpasswd').value.trim();
										if (passwd!=conpasswd){
											alert('Password do not match');
										}
										else{
											document.getElementById('finalreg').innerHTML=`<span class="fa fa-solid fa-hourglass" style="animation-name:loading;animation-duration:1s;animation-iteration-count:infinite;animation-fill-mode:forwards;"></span>`;
											await db.collection('residents').doc(username).set({
												add:document.getElementById('addr').value.trim(),
												block:document.getElementById('block').value.trim(),
												d_no:document.getElementById('doorno').value.trim(),
												floor:document.getElementById('floor').value.trim(),
												name:document.getElementById('name').value.trim(),
												phno:document.getElementById('phno').value.trim()
											});
											await auth.createUserWithEmailAndPassword(username,document.getElementById('passwd').value.trim());
											alert('Successfully resgitered.\nLogin with your new Credentials.\nThank you for for registering');
											window.open('index.html','_self');
											document.getElementById('finalreg').innerHTML= `<span class="fa fa-solid fa-registered"></span>  Register`
										}
									}
								}


							}
						}


						

					}
				}
				
				
			}
		}

	}
